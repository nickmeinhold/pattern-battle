  .opt:hover:not(:disabled){background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.3);transform:translateX(3px)}

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const BUZZ_DB   = 0.13;
const Q_SECS    = 30;
const SYNC_MS   = 400;
const NUM_QS    = 7;
const PTS_RIGHT = 100;
const PTS_WRONG = -30;
const PTS_SPEED = 60;
const API_KEY   = ['sk-ant-api03-3H4LT4ZJZhwMQRwFeLIqcP0xjfQBiW0uFRRYr8PFwkr','kVniC-Fm1Dv7kQy8MmYWSHPPe9qN2i8V1IoQbA6l-ug-p-w0vgAA'].join('');
const PRED_DEBOUNCE = 500;
const RETREAT_MS    = 20;
const SILENCE_MS    = 2500;

const TOPICS = [
  "Singleton pattern — pros, cons, thread safety, when to avoid",
  "Factory Method vs Abstract Factory — differences and use-cases",
  "Builder pattern — vs telescoping constructors, fluent interface",
  "Adapter vs Facade — structural differences and real scenarios",
  "Decorator pattern — dynamic responsibilities, real-world examples",
  "Observer / Pub-Sub — in modern event-driven systems",
  "Strategy pattern — replacing conditional logic at runtime",
  "Command pattern — undo/redo, queuing, macros",
  "MVC vs MVVM — data binding, roles, trade-offs",
  "Microservices vs Monolith — scalability, complexity, when to choose",
  "Event-Driven Architecture — pros, cons, eventual consistency",
  "CQRS — command/query separation, benefits, complexity cost",
  "Proxy pattern — lazy loading, security, virtual proxy use-cases",
  "Chain of Responsibility — request passing, middleware analogy",
  "Hexagonal / Ports & Adapters — isolating domain logic",
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 10);
const SK  = c => `pb:v5:${c}`;

// BroadcastChannel for instant cross-tab sync
const BC = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('pattern-battle') : null;

// ── STORAGE (localStorage + BroadcastChannel) ─────────────────────────────────
function readRoom(code) {
  try { return JSON.parse(localStorage.getItem(SK(code)) || 'null'); }
  catch { return null; }
}
function writeRoom(code, state) {
  try {
    localStorage.setItem(SK(code), JSON.stringify(state));
    BC?.postMessage({ type: 'update', code });
  } catch {}
}

// ── API ───────────────────────────────────────────────────────────────────────
const API_HEADERS = {
  'Content-Type': 'application/json',
  'x-api-key': API_KEY,
  'anthropic-version': '2023-06-01',
  'anthropic-dangerous-direct-browser-access': 'true',
};

async function genQ(topic) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: API_HEADERS,
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 500,
      system: `You are a quiz generator for software design patterns. Generate open-ended questions that test conceptual understanding — no multiple choice.
Return ONLY valid JSON — no markdown, no backticks, zero preamble:
{"question":"a practical scenario-based question that requires explaining the concept","answer":"the correct answer as a clear 1-2 sentence explanation","explanation":"a brief elaboration on why this is correct"}
Rules: question should be specific enough to have one clearly correct answer; answer should capture the key concept concisely.`,
      messages: [{ role: 'user', content: `Topic: ${topic}` }],
    }),
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  const raw = d.content?.[0]?.text?.replace(/```json|```/g, '').trim();
  return JSON.parse(raw);
}

// Streaming helper — parses Anthropic SSE, calls onToken per text delta
async function streamChat({ model, system, messages, maxTokens = 100, signal, onToken }) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: API_HEADERS,
    body: JSON.stringify({ model, max_tokens: maxTokens, stream: true, system, messages }),
    signal,
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  let full = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      try {
        const d = JSON.parse(line.slice(6));
        if (d.type === 'content_block_delta' && d.delta?.text) {
          full += d.delta.text;
          onToken(d.delta.text, full);
        }
      } catch {}
    }
  }
  return full;
}

// LLM answer judge — returns {correct, score, feedback}
async function callJudge(question, spoken, signal) {
  const q = question;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: API_HEADERS,
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 200,
      system: `You judge quiz answers. Given a question and its correct answer, evaluate whether the player's spoken response demonstrates understanding of the correct concept. They may name the pattern, describe the concept, or give a partial answer. Be lenient with exact wording but strict on conceptual correctness. Return ONLY valid JSON — no markdown, no backticks:
{"correct":true,"score":85,"feedback":"Good — correctly identified the pattern and its key benefit."}
Score guide: 100=perfect, 70-99=right concept with gaps, 50-69=partially correct, 0-49=wrong.`,
      messages: [{ role: 'user', content: `Question: ${q.question}\nCorrect answer: ${q.answer}\nExplanation: ${q.explanation}\n\nPlayer said: "${spoken}"` }],
    }),
    signal,
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  const raw = d.content?.[0]?.text?.replace(/```json|```/g, '').trim();
  return JSON.parse(raw);
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  // Identity
  const [pid]                   = useState(uid);
  const [pname, setPname]       = useState('');
  const [roomCode, setRoomCode] = useState('');
  const [isHost, setIsHost]     = useState(false);
  const [screen, setScreen]     = useState('join');

  // Game state
  const [gs, setGs]             = useState(null);

  // Audio / voice
  const [vol, setVol]           = useState(0);
  const [eqBands, setEqBands]   = useState(() => new Array(32).fill(0));
  const [micOk, setMicOk]       = useState(false);
  const [micErr, setMicErr]     = useState('');
  const [transcript, setTranscript] = useState('');
  const [listening, setListening]   = useState(false);

  // Prediction + judging
  const [ghostText, setGhostText]   = useState('');
  const [judging, setJudging]       = useState(false);

  // UI
  const [joining, setJoining]       = useState(false);
  const [genProgress, setGenProgress] = useState(0);
  const [generating, setGenerating] = useState(false);
  const [timeLeft, setTimeLeft]     = useState(Q_SECS);
  const [resultFlash, setResultFlash] = useState(null);
  const [fallbackInput, setFallbackInput] = useState('');
  const [showFallback, setShowFallback]   = useState(false);
  const [newRoomCode]           = useState(() => uid().slice(0,6).toUpperCase());

  // Refs
  const analyserRef    = useRef(null);
  const streamRef      = useRef(null);
  const animRef        = useRef(null);
  const syncRef        = useRef(null);
  const sttRef         = useRef(null);
  const buzzedRef      = useRef(false);
  const gsRef          = useRef(null);
  const codeRef        = useRef('');
  const pnameRef       = useRef('');
  const pidRef         = useRef(pid);

  // Prediction refs
  const predAbortRef     = useRef(null);
  const judgeAbortRef    = useRef(null);
  const retreatTimerRef  = useRef(null);
  const debounceTimerRef = useRef(null);
  const ghostTextRef     = useRef('');
  const lastSpokenRef    = useRef('');
  const submittedRef     = useRef(false);

  gsRef.current    = gs;
  codeRef.current  = roomCode;
  pnameRef.current = pname;

  const phase   = gs?.phase;
  const curQ    = gs?.currentQuestion;
  const buzzer  = gs?.buzzer;
  const players = gs?.players || {};
  const myScore = players[pid]?.score || 0;
  const sorted  = Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  const isBuzzer = buzzer?.pid === pid;

  // ── BroadcastChannel listener ─────────────────────────────────────────────
  useEffect(() => {
    if (!BC) return;
    BC.onmessage = (e) => {
      if (e.data?.code === codeRef.current) syncState();
    };
  }, []);

  function resetPredictionState() {
    cancelAllPredictions();
    setTranscript('');
    setFallbackInput('');
    setShowFallback(false);
    setListening(false);
    setJudging(false);
    submittedRef.current = false;
  }

  function syncState() {
    const state = readRoom(codeRef.current);
    if (!state) return;
    setGs(prev => {
      if (prev?.phase !== 'question' && state.phase === 'question') {
        buzzedRef.current = false;
        resetPredictionState();
      }
      return state;
    });
    if (state.phase === 'question' && state.qStart) {
      const left = Math.max(0, Q_SECS - (Date.now() - state.qStart) / 1000);
      setTimeLeft(Math.ceil(left));
    }
    if (state.phase !== 'lobby') setScreen('game');
    // STT started manually via "Use voice" button (requires user gesture)
  }

  // ── Polling sync (fallback + timer) ────────────────────────────────────────
  function startSync(rc) {
    clearInterval(syncRef.current);
    syncRef.current = setInterval(() => {
      const state = readRoom(rc);
      if (!state) return;
      setGs(prev => {
        if (prev?.phase !== 'question' && state.phase === 'question') {
          buzzedRef.current = false;
          resetPredictionState();
        }
        return state;
      });
      if (state.phase === 'question' && state.qStart) {
        const elapsed = (Date.now() - state.qStart) / 1000;
        const left = Math.max(0, Q_SECS - elapsed);
        setTimeLeft(Math.ceil(left));
        if (left <= 0 && state.hostId === pidRef.current && state.phase === 'question')
          timeUp(rc, state);
      }
      if (state.phase !== 'lobby') setScreen('game');
      if (state.phase === 'buzzedin' && state.buzzer?.pid === pidRef.current) {
        if (!sttRef.current?.active) doSTT();
      }
    }, SYNC_MS);
  }

  // ── Mic ───────────────────────────────────────────────────────────────────
  async function initMic() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      streamRef.current = stream;
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const an  = ctx.createAnalyser();
      an.fftSize = 512;
      analyserRef.current = an;
      ctx.createMediaStreamSource(stream).connect(an);
      const data = new Uint8Array(an.frequencyBinCount);
      const EQ_N = 32;
      const binsPer = Math.floor(an.frequencyBinCount / EQ_N);
      let frameCount = 0;
      function tick() {
        an.getByteFrequencyData(data);
        const rms = Math.sqrt(data.reduce((s,v)=>s+v*v,0)/data.length)/128;
        setVol(rms);
        // Sample frequency bands every 2 frames for performance
        if (frameCount++ % 2 === 0) {
          const bands = new Array(EQ_N);
          for (let i = 0; i < EQ_N; i++) {
            let sum = 0;
            const start = i * binsPer;
            for (let j = start; j < start + binsPer; j++) sum += data[j];
            bands[i] = (sum / binsPer) / 255;
          }
          setEqBands(bands);
        }
        const cur = gsRef.current;
        if (cur?.phase === 'question' && !buzzedRef.current && rms > BUZZ_DB) {
          buzzedRef.current = true;
          buzzIn();
        }
        animRef.current = requestAnimationFrame(tick);
      }
      tick();
      setMicOk(true);
      setMicErr('');
    } catch(e) {
      setMicErr(e.name === 'NotAllowedError'
        ? '🎤 Microphone denied — click the camera icon in your address bar to allow it, then refresh.'
        : 'Mic error: ' + e.message);
    }
  }

  // ── Buzz In ───────────────────────────────────────────────────────────────
  function buzzIn() {
    const state = readRoom(codeRef.current);
    if (!state || state.phase !== 'question' || state.buzzer) {
      buzzedRef.current = false;
      return;
    }
    const updated = {
      ...state, phase: 'buzzedin',
      buzzer: { pid: pidRef.current, name: pnameRef.current, ts: Date.now() }
    };
    writeRoom(codeRef.current, updated);
    setGs(updated);
    // STT requires user gesture — started via "Use voice" button
  }

  // ── Prediction System ─────────────────────────────────────────────────────
  function cancelAllPredictions() {
    predAbortRef.current?.abort();
    clearInterval(retreatTimerRef.current);
    clearTimeout(debounceTimerRef.current);
    ghostTextRef.current = '';
    setGhostText('');
  }

  function startPrediction(spoken) {
    predAbortRef.current?.abort();
    const ctrl = new AbortController();
    predAbortRef.current = ctrl;
    const q = gsRef.current?.currentQuestion;
    if (!q) return;

    streamChat({
      model: 'claude-haiku-4-5-20251001',
      system: 'You predict what a quiz player will say next as they answer a question aloud. Given the question and what they have said so far, output ONLY the predicted continuation (3-8 words). No quotes, no explanation, no repeating what they said. Start with a space if the continuation follows naturally after their last word.',
      messages: [{ role: 'user', content: `Question: ${q.question}\nCorrect answer: ${q.answer}\n\nPlayer said so far: "${spoken}"\nPredict continuation:` }],
      maxTokens: 40,
      signal: ctrl.signal,
      onToken: (_tok, full) => {
        ghostTextRef.current = full;
        setGhostText(full);
      },
    }).catch(() => {}); // silent on abort/error
  }

  function startRetreat(onDone) {
    clearInterval(retreatTimerRef.current);
    retreatTimerRef.current = setInterval(() => {
      const cur = ghostTextRef.current;
      if (!cur || cur.length === 0) {
        clearInterval(retreatTimerRef.current);
        setGhostText('');
        if (onDone) onDone();
        return;
      }
      const next = cur.slice(0, -1);
      ghostTextRef.current = next;
      setGhostText(next);
    }, RETREAT_MS);
  }

  function handleInterimSpeech(spoken) {
    lastSpokenRef.current = spoken;
    clearTimeout(debounceTimerRef.current);
    predAbortRef.current?.abort();

    // If ghost text exists, retreat it
    if (ghostTextRef.current.length > 0) {
      startRetreat();
    }

    // Debounce new prediction — fires after speech pauses
    const wordCount = spoken.trim().split(/\s+/).length;
    if (wordCount >= 2) {
      debounceTimerRef.current = setTimeout(() => {
        // Clear any remaining ghost, then predict
        clearInterval(retreatTimerRef.current);
        ghostTextRef.current = '';
        setGhostText('');
        startPrediction(lastSpokenRef.current);
      }, PRED_DEBOUNCE);
    }
  }

  // ── STT (requires user gesture to start in most browsers) ──────────────────
  function doSTT() {
    if (sttRef.current?.active) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { console.warn('SpeechRecognition not available'); return; }
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = 'en-US';
    r.active = true;
    sttRef.current = r;
    setListening(true);
    submittedRef.current = false;

    let lastT = '';
    let silenceTimer = null;

    const submit = (text) => {
      if (submittedRef.current) return;
      if (!text || !text.trim()) return;
      submittedRef.current = true;
      r.active = false;
      setListening(false);
      clearTimeout(silenceTimer);
      try { r.stop(); } catch {}
      cancelAllPredictions();
      handleAnswer(text);
    };

    r.onresult = e => {
      const t = Array.from(e.results).map(x => x[0].transcript).join('');
      lastT = t;
      setTranscript(t);
      if (!submittedRef.current) handleInterimSpeech(t);

      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => submit(lastT), SILENCE_MS);
    };

    r.onerror = (ev) => {
      console.warn('STT error:', ev.error);
      r.active = false;
      setListening(false);
      clearTimeout(silenceTimer);
    };

    r.onend = () => {
      r.active = false;
      setListening(false);
      clearTimeout(silenceTimer);
      if (!submittedRef.current && lastT.trim()) submit(lastT);
    };

    try { r.start(); } catch(e) { console.warn('STT start failed:', e); r.active = false; setListening(false); }
  }

  // ── Handle Answer (async — LLM judges) ─────────────────────────────────────
  async function handleAnswer(spoken) {
    const state = readRoom(codeRef.current);
    if (!state || state.phase !== 'buzzedin') return;
    if (state.buzzer?.pid !== pidRef.current) return;

    setJudging(true);
    cancelAllPredictions();

    let result = { correct: false, score: 0, feedback: 'Could not evaluate answer.' };
    try {
      const ctrl = new AbortController();
      judgeAbortRef.current = ctrl;
      result = await callJudge(state.currentQuestion, spoken, ctrl.signal);
    } catch (e) {
      if (e.name === 'AbortError') { setJudging(false); return; }
      console.warn('Judge failed:', e);
    }

    setJudging(false);

    const elapsed = (Date.now() - (state.qStart || Date.now())) / 1000;
    const speedBonus = Math.round(PTS_SPEED * Math.max(0, 1 - elapsed / Q_SECS));
    const pts = result.correct
      ? Math.round((result.score / 100) * PTS_RIGHT) + Math.round((result.score / 100) * speedBonus)
      : PTS_WRONG;

    setResultFlash(result.correct ? 'correct' : 'wrong');
    setTimeout(() => setResultFlash(null), 2500);

    const newPlayers = { ...state.players };
    newPlayers[pidRef.current] = {
      ...newPlayers[pidRef.current],
      score: (newPlayers[pidRef.current]?.score || 0) + pts,
    };

    const q = state.currentQuestion;
    const updated = {
      ...state, phase: 'result', players: newPlayers,
      lastResult: {
        pid: pidRef.current, pname: pnameRef.current,
        spoken, correct: result.correct, score: result.score,
        feedback: result.feedback, pts, noAnswer: false,
        correctAnswer: q?.answer, explanation: q?.explanation,
      },
    };
    writeRoom(codeRef.current, updated);
    setGs(updated);

    // Manual advance via "Next Question" button
  }

  function submitTextAnswer() {
    if (!fallbackInput.trim() || judging) return;
    setShowFallback(false);
    submittedRef.current = true;
    cancelAllPredictions();
    handleAnswer(fallbackInput);
  }

  function timeUp(rc, state) {
    if (state.phase !== 'question') return;
    const q = state.currentQuestion;
    const updated = {
      ...state, phase: 'result',
      lastResult: {
        noAnswer: true, correctAnswer: q?.answer, explanation: q?.explanation,
      },
    };
    writeRoom(rc, updated);
  }

  function advance(rc) {
    const state = readRoom(rc);
    if (!state) return;
    const next = (state.currentQ || 0) + 1;
    if (next >= (state.questions || []).length) {
      writeRoom(rc, { ...state, phase: 'gameover' });
    } else {
      buzzedRef.current = false;
      writeRoom(rc, {
        ...state, phase: 'question', currentQ: next,
        currentQuestion: state.questions[next], qStart: Date.now(),
        buzzer: null, lastResult: null,
      });
    }
  }

  // ── Join Room ─────────────────────────────────────────────────────────────
  async function joinRoom(forcedCode) {
    const n  = pname.trim();
    const rc = (forcedCode || roomCode).toUpperCase().trim();
    if (!n || !rc) return;
    setJoining(true);

    let state = readRoom(rc);
    let host  = false;
    if (!state) {
      host  = true;
      state = {
        phase:'lobby', players:{}, questions:[], currentQ:0,
        currentQuestion:null, qStart:null, buzzer:null, lastResult:null, hostId:pid,
      };
    }
    state.players[pid] = { name: n, score: 0 };
    writeRoom(rc, state);

    setIsHost(host || state.hostId === pid);
    setGs(state);
    setRoomCode(rc);
    setScreen('lobby');
    startSync(rc);
    await initMic();
    setJoining(false);
  }

  // ── Start Game ────────────────────────────────────────────────────────────
  async function startGame() {
    setGenerating(true); setGenProgress(0);
    const shuffled = [...TOPICS].sort(() => Math.random() - 0.5).slice(0, NUM_QS);
    const questions = [];
    for (let i = 0; i < shuffled.length; i++) {
      try { questions.push(await genQ(shuffled[i])); }
      catch(e) { console.warn('Q gen failed:', e); }
      setGenProgress(i + 1);
    }
    if (!questions.length) { setGenerating(false); return; }

    const state = readRoom(roomCode);
    buzzedRef.current = false;
    const updated = {
      ...state, phase:'question', questions, currentQ:0,
      currentQuestion: questions[0], qStart: Date.now(), buzzer:null, lastResult:null,
    };
    writeRoom(roomCode, updated);
    setGs(updated);
    setScreen('game');
    setGenerating(false);
  }

  // ── Cleanup ───────────────────────────────────────────────────────────────
  useEffect(() => () => {
    cancelAnimationFrame(animRef.current);
    clearInterval(syncRef.current);
    streamRef.current?.getTracks().forEach(t => t.stop());
    analyserRef.current?.context?.close?.();
    predAbortRef.current?.abort();
    judgeAbortRef.current?.abort();
    clearInterval(retreatTimerRef.current);
    clearTimeout(debounceTimerRef.current);
  }, []);

  // ── EQ Colors ────────────────────────────────────────────────────────────
  const eqColor = (h) => h > 0.7 ? '#ef4444' : h > 0.4 ? '#fbbf24' : '#22d3ee';

  // ── Timer Arc ─────────────────────────────────────────────────────────────
  const timerPct   = timeLeft / Q_SECS;
  const timerColor = timerPct > 0.5 ? '#22d3ee' : timerPct > 0.25 ? '#fbbf24' : '#ef4444';
  const arc  = 2*Math.PI*36;
  const dash = arc * timerPct;

  // ── Stars ─────────────────────────────────────────────────────────────────
  const [stars] = useState(() => Array.from({length:60},()=>({
    left:`${Math.random()*100}%`, top:`${Math.random()*100}%`,
    size:Math.random()*2+0.5, op:Math.random()*0.35+0.05, d:Math.random()*4+2,
  })));

  const root = {
    minHeight:'100vh', background:'#060914', color:'white',
    fontFamily:"'Rajdhani',sans-serif", position:'relative', overflow:'hidden',
  };

  const lr = gs?.lastResult;
  const qIdx = (gs?.currentQ||0)+1;
  const qTotal = (gs?.questions||[]).length;

  // ══════════════════════════════════════════════════════════════════════════
  // SCREEN: JOIN
  // ══════════════════════════════════════════════════════════════════════════
  if (screen === 'join') return (
    <div style={root}>
      {stars.map((s,i)=>(
        <div key={i} style={{position:'absolute',left:s.left,top:s.top,width:s.size,height:s.size,
          borderRadius:'50%',background:'white',opacity:s.op,animation:`glow ${s.d}s ease-in-out infinite`}}/>
      ))}
      <div style={{maxWidth:480,margin:'0 auto',padding:'50px 24px',display:'flex',flexDirection:'column',gap:28,animation:'fadeUp .5s ease'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'Rajdhani',fontSize:40,fontWeight:700,letterSpacing:4,
            background:'linear-gradient(135deg,#fbbf24,#f97316,#ef4444)',
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>⚔ PATTERN BATTLE</div>
          <div style={{color:'rgba(255,255,255,.4)',fontSize:12,letterSpacing:3,marginTop:4}}>MULTIPLAYER · VOICE-ACTIVATED</div>
        </div>
        <div className="card" style={{display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <div style={{fontSize:12,letterSpacing:2,color:'rgba(255,255,255,.5)',marginBottom:8}}>YOUR NAME</div>
            <input className="inp" placeholder="Enter your name..." value={pname}
              onChange={e=>setPname(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&pname.trim()&&roomCode.trim()&&joinRoom()}/>
          </div>

          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/>
            <span style={{fontSize:11,color:'rgba(255,255,255,.3)',letterSpacing:2}}>JOIN EXISTING ROOM</span>
            <div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/>
          </div>

          <input className="inp" placeholder="Room code..." value={roomCode}
            onChange={e=>setRoomCode(e.target.value.toUpperCase())}
            onKeyDown={e=>e.key==='Enter'&&pname.trim()&&roomCode.trim()&&joinRoom()}
            style={{textTransform:'uppercase',letterSpacing:4,fontWeight:700}}/>

          <button className="btn btn-ghost" style={{width:'100%'}}
            disabled={!pname.trim()||!roomCode.trim()||joining}
            onClick={()=>joinRoom()}>
            {joining ? 'Joining...' : 'JOIN ROOM →'}
          </button>

          <div style={{display:'flex',gap:12,alignItems:'center',marginTop:4}}>
            <div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/>
            <span style={{fontSize:11,color:'rgba(255,255,255,.3)',letterSpacing:2}}>OR CREATE NEW</span>
            <div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/>
          </div>

          <button className="btn btn-gold" style={{width:'100%',fontSize:17,padding:'14px'}}
            disabled={!pname.trim()||joining}
            onClick={()=>joinRoom(newRoomCode)}>
            ✦ CREATE ROOM
          </button>
        </div>
        <div style={{textAlign:'center',fontSize:12,color:'rgba(255,255,255,.25)',lineHeight:1.6}}>
          Open in two tabs → same room code → Start Battle<br/>
          🎤 Chrome/Edge for voice · type fallback always available
        </div>
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // SCREEN: LOBBY
  // ══════════════════════════════════════════════════════════════════════════
  if (screen === 'lobby') return (
    <div style={root}>
      {stars.map((s,i)=>(
        <div key={i} style={{position:'absolute',left:s.left,top:s.top,width:s.size,height:s.size,
          borderRadius:'50%',background:'white',opacity:s.op}}/>
      ))}
      <div style={{maxWidth:520,margin:'0 auto',padding:'50px 24px',animation:'fadeUp .4s ease'}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{fontFamily:'Rajdhani',fontSize:32,fontWeight:700,letterSpacing:3,color:'#fbbf24'}}>WAITING ROOM</div>
          <div style={{display:'inline-flex',alignItems:'center',gap:14,marginTop:14,
            background:'rgba(251,191,36,.07)',border:'1px solid rgba(251,191,36,.2)',
            borderRadius:12,padding:'10px 22px'}}>
            <span style={{fontSize:12,color:'rgba(255,255,255,.45)',letterSpacing:2}}>ROOM CODE</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:26,fontWeight:700,color:'#fbbf24',letterSpacing:7}}>
              {roomCode}
            </span>
          </div>
          <div style={{fontSize:12,color:'rgba(255,255,255,.35)',marginTop:8}}>
            Share with your opponent — open in a second browser tab or window
          </div>
        </div>

        <div className="card" style={{marginBottom:20}}>
          <div style={{fontSize:11,letterSpacing:2,color:'rgba(255,255,255,.4)',marginBottom:14}}>
            PLAYERS ({Object.keys(players).length})
          </div>
          {Object.entries(players).map(([id,p])=>(
            <div key={id} style={{
              display:'flex',alignItems:'center',gap:12,padding:'12px 16px',
              background:'rgba(255,255,255,.04)',borderRadius:10,marginBottom:8,
              border: id===pid ? '1px solid rgba(251,191,36,.3)' : '1px solid transparent',
            }}>
              <div style={{width:38,height:38,borderRadius:'50%',flexShrink:0,
                background:`hsl(${id.charCodeAt(0)*17}deg 55% 55%)`,
                display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:16}}>
                {p.name[0]?.toUpperCase()}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16}}>
                  {p.name} {id===pid&&<span style={{fontSize:10,color:'#fbbf24',letterSpacing:1}}>YOU</span>}
                </div>
                {gs?.hostId===id&&<div style={{fontSize:10,color:'rgba(255,255,255,.4)',letterSpacing:1}}>HOST</div>}
              </div>
              <div style={{width:8,height:8,borderRadius:'50%',background:'#22c55e',boxShadow:'0 0 6px #22c55e'}}/>
            </div>
          ))}
          {Object.keys(players).length < 2 && (
            <div style={{textAlign:'center',padding:16,color:'rgba(255,255,255,.3)',fontSize:13,animation:'glow 2s ease-in-out infinite'}}>
              Waiting for players to join...
            </div>
          )}
        </div>

        {micErr && <div style={{background:'rgba(239,68,68,.1)',border:'1px solid #ef4444',borderRadius:10,
          padding:'12px 16px',marginBottom:16,fontSize:13,color:'#fca5a5',lineHeight:1.5}}>{micErr}</div>}

        {micOk && <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:'#22c55e',boxShadow:'0 0 6px #22c55e',animation:'glow 1.5s infinite'}}/>
          <span style={{fontSize:12,color:'rgba(255,255,255,.45)'}}>Microphone active — speak to buzz in during the game</span>
        </div>}

        {isHost ? (
          generating ? (
            <div style={{textAlign:'center',padding:20}}>
              <div style={{width:36,height:36,border:'3px solid rgba(255,255,255,.1)',
                borderTop:'3px solid #fbbf24',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 14px'}}/>
              <div style={{fontSize:14,color:'rgba(255,255,255,.6)',marginBottom:10}}>
                Generating questions... {genProgress}/{NUM_QS}
              </div>
              <div style={{height:4,background:'rgba(255,255,255,.08)',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${genProgress/NUM_QS*100}%`,
                  background:'linear-gradient(90deg,#f59e0b,#ef4444)',borderRadius:2,transition:'width .4s'}}/>
              </div>
            </div>
          ) : (
            <button className="btn btn-gold" onClick={startGame} style={{width:'100%',fontSize:18,padding:16}}>
              ⚔️ START BATTLE
            </button>
          )
        ) : (
          <div style={{textAlign:'center',color:'rgba(255,255,255,.4)',fontSize:14,animation:'glow 2.5s infinite'}}>
            Waiting for host to start the battle...
          </div>
        )}
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // SCREEN: GAME
  // ══════════════════════════════════════════════════════════════════════════
  return (
    <div style={{
      ...root, minHeight:'100vh', display:'flex', flexDirection:'column',
      animation: resultFlash === 'correct' ? 'correctFlash .8s ease' : resultFlash === 'wrong' ? 'wrongFlash .8s ease' : 'none',
    }}>
      {resultFlash && (
        <div style={{position:'fixed',inset:0,zIndex:1000,pointerEvents:'none',
          background: resultFlash==='correct'
            ? 'radial-gradient(circle at center,rgba(34,197,94,.12) 0%,transparent 70%)'
            : 'radial-gradient(circle at center,rgba(239,68,68,.12) 0%,transparent 70%)'}}/>
      )}

      {/* ── HEADER ── */}
      <div style={{padding:'10px 20px',background:'rgba(6,9,20,.97)',backdropFilter:'blur(12px)',
        borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:14,
        position:'sticky',top:0,zIndex:100,flexShrink:0}}>
        <div style={{fontFamily:'Rajdhani',fontWeight:700,fontSize:18,letterSpacing:3,color:'#fbbf24'}}>⚔ PATTERN BATTLE</div>
        {(phase==='question'||phase==='buzzedin'||phase==='result')&&(
          <div style={{fontSize:12,color:'rgba(255,255,255,.4)',letterSpacing:1}}>Q {qIdx}/{qTotal}</div>
        )}
        <div style={{flex:1}}/>
        {/* All player scores */}
        {sorted.map(([id,p])=>(
          <div key={id} style={{
            background: id===pid ? 'rgba(251,191,36,.1)' : 'rgba(255,255,255,.05)',
            border: `1px solid ${id===pid ? 'rgba(251,191,36,.2)' : 'rgba(255,255,255,.08)'}`,
            borderRadius:8,padding:'4px 12px',display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:20,height:20,borderRadius:'50%',flexShrink:0,
              background:`hsl(${id.charCodeAt(0)*17}deg 55% 55%)`,
              display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:10}}>
              {p.name[0]?.toUpperCase()}
            </div>
            <span style={{fontWeight:700,color:id===pid?'#fbbf24':'rgba(255,255,255,.7)',fontSize:15,
              fontFamily:"'JetBrains Mono',monospace"}}>{p.score||0}</span>
          </div>
        ))}
        <div style={{fontSize:11,color:'rgba(255,255,255,.2)',fontFamily:"'JetBrains Mono',monospace",letterSpacing:2}}>{roomCode}</div>
      </div>

      {/* ── GAME OVER ── */}
      {phase === 'gameover' && (
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{maxWidth:500,width:'100%',animation:'fadeUp .5s ease'}}>
            <div style={{textAlign:'center',marginBottom:32}}>
              <div style={{fontSize:60,marginBottom:8}}>🏆</div>
              <div style={{fontFamily:'Rajdhani',fontSize:44,fontWeight:700,letterSpacing:3,
                background:'linear-gradient(135deg,#fbbf24,#f97316)',
                WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>GAME OVER</div>
            </div>
            <div className="card" style={{display:'flex',flexDirection:'column',gap:10}}>
              {sorted.map(([id,p],i)=>(
                <div key={id} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',
                  borderRadius:12,animation:`fadeUp ${.2+i*.1}s ease`,
                  background: i===0 ? 'rgba(251,191,36,.1)' : 'rgba(255,255,255,.04)',
                  border: i===0 ? '1px solid rgba(251,191,36,.3)' : '1px solid rgba(255,255,255,.06)'}}>
                  <div style={{fontSize:26,width:36,textAlign:'center'}}>
                    {i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '}
                  </div>
                  <div style={{width:42,height:42,borderRadius:'50%',flexShrink:0,
                    background:`hsl(${id.charCodeAt(0)*17}deg 55% 55%)`,
                    display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:17}}>
                    {p.name[0]?.toUpperCase()}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:16}}>{p.name} {id===pid&&<span style={{fontSize:10,color:'#fbbf24'}}>YOU</span>}</div>
                  </div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:24,fontWeight:700,
                    color: i===0?'#fbbf24':'rgba(255,255,255,.8)'}}>{p.score}</div>
                </div>
              ))}
            </div>
            <div style={{textAlign:'center',marginTop:20}}>
              <button className="btn btn-gold" onClick={()=>{ clearInterval(syncRef.current); localStorage.removeItem(SK(roomCode)); setScreen('join'); setGs(null); setRoomCode(''); setTimeLeft(Q_SECS); }}>
                Play Again
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── MAIN GAME ── */}
      {(phase==='question'||phase==='buzzedin'||phase==='result') && (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>

          {/* Graphic EQ — horizontal bar near the bottom */}
          <div style={{position:'absolute',bottom:16,left:0,right:0,height:48,zIndex:10,
            display:'flex',alignItems:'flex-end',gap:2,padding:'0 8px',
            pointerEvents:'none'}}>
            {eqBands.map((h,i) => (
              <div key={i} style={{flex:1,borderRadius:'2px 2px 0 0',
                height:`${Math.max(2, h * 100)}%`,
                background: eqColor(h),
                opacity: h > 0.05 ? 0.7 + h * 0.3 : 0.15,
                boxShadow: h > 0.5 ? `0 0 6px ${eqColor(h)}` : 'none',
                transition:'height .06s linear'}}/>
            ))}
          </div>

          {/* Single column content */}
          <div style={{flex:1,padding:'22px 32px 22px 20px',overflowY:'auto',
            display:'flex',flexDirection:'column',gap:18,maxWidth:720,margin:'0 auto',width:'100%'}}>

            {/* Result reveal */}
            {phase==='result' && lr && (
              <div style={{padding:'16px 20px',borderRadius:14,animation:'fadeUp .4s ease',
                background: lr.noAnswer ? 'rgba(255,255,255,.04)' : lr.correct ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)',
                border: `1px solid ${lr.noAnswer ? 'rgba(255,255,255,.12)' : lr.correct ? '#22c55e' : '#ef4444'}`}}>
                {lr.noAnswer ? (
                  <div style={{fontSize:15,color:'rgba(255,255,255,.7)'}}>⏱ <strong>Time's up!</strong> No one buzzed in.</div>
                ) : (
                  <>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                      <span style={{fontSize:22}}>{lr.correct?'✅':'❌'}</span>
                      <span style={{fontWeight:700,fontSize:15,color:lr.correct?'#4ade80':'#f87171'}}>
                        {lr.pname}{lr.pid===pid?' (you)':''}
                      </span>
                      <span style={{marginLeft:'auto',fontFamily:"'JetBrains Mono',monospace",fontWeight:700,
                        fontSize:16,color:lr.pts>0?'#4ade80':'#f87171'}}>
                        {lr.pts>0?'+':''}{lr.pts} pts
                      </span>
                    </div>
                    {/* What they said */}
                    <div style={{fontSize:13,color:'rgba(255,255,255,.5)',marginBottom:8,fontFamily:"'JetBrains Mono',monospace",
                      fontStyle:'italic',lineHeight:1.5}}>
                      "{lr.spoken}"
                    </div>
                    {/* Score bar */}
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                      <div style={{flex:1,height:6,background:'rgba(255,255,255,.08)',borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${lr.score||0}%`,borderRadius:3,transition:'width .6s ease',
                          background: lr.score>=70 ? 'linear-gradient(90deg,#22c55e,#4ade80)' :
                                     lr.score>=50 ? 'linear-gradient(90deg,#f59e0b,#fbbf24)' :
                                                    'linear-gradient(90deg,#ef4444,#f87171)'}}/>
                      </div>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,
                        color: lr.score>=70?'#4ade80':lr.score>=50?'#fbbf24':'#f87171'}}>
                        {lr.score}/100
                      </span>
                    </div>
                    {/* LLM feedback */}
                    {lr.feedback && (
                      <div style={{fontSize:13,color:'rgba(255,255,255,.6)',lineHeight:1.5,marginBottom:8}}>
                        {lr.feedback}
                      </div>
                    )}
                  </>
                )}
                <div style={{fontSize:13,color:'rgba(255,255,255,.6)',lineHeight:1.65,
                  borderTop:'1px solid rgba(255,255,255,.08)',paddingTop:10,marginTop:4}}>
                  <strong style={{color:'rgba(255,255,255,.85)'}}>✦ Answer:</strong> {lr.correctAnswer}
                  <br/><span style={{color:'rgba(255,255,255,.45)'}}>{lr.explanation}</span>
                </div>
                <div style={{textAlign:'center',marginTop:14}}>
                  <button className="btn btn-gold" onClick={()=>advance(codeRef.current)}
                    style={{fontSize:15,padding:'10px 32px'}}>
                    {(gs?.currentQ||0)+1 >= (gs?.questions||[]).length ? '🏆 See Results' : 'Next Question →'}
                  </button>
                </div>
              </div>
            )}

            {/* Question card */}
            {curQ && (
              <div className="card" style={{animation:'fadeUp .35s ease'}}>
                <div style={{fontSize:14,lineHeight:1.7,color:'rgba(255,255,255,.9)',fontFamily:"'JetBrains Mono',monospace"}}>
                  {curQ.question}
                </div>
              </div>
            )}

            {/* Buzz in state */}
            {phase==='buzzedin' && (
              <div style={{padding:'16px 20px',borderRadius:14,
                background: isBuzzer ? 'rgba(34,211,238,.1)' : 'rgba(255,255,255,.05)',
                border: `1px solid ${isBuzzer ? '#22d3ee' : 'rgba(255,255,255,.1)'}`,
                animation: isBuzzer ? 'buzz .4s ease' : 'fadeUp .3s ease'}}>
                {isBuzzer ? (<>
                  {/* Judging spinner */}
                  {judging ? (
                    <div style={{display:'flex',alignItems:'center',gap:12,padding:'6px 0'}}>
                      <div style={{width:22,height:22,border:'2px solid rgba(255,255,255,.1)',
                        borderTop:'2px solid #fbbf24',borderRadius:'50%',animation:'spin .8s linear infinite',flexShrink:0}}/>
                      <div>
                        <div style={{color:'#fbbf24',fontSize:14,fontWeight:600}}>Evaluating answer...</div>
                        <div style={{fontSize:12,color:'rgba(255,255,255,.35)',marginTop:2,fontFamily:"'JetBrains Mono',monospace",fontStyle:'italic'}}>
                          "{transcript || fallbackInput}"
                        </div>
                      </div>
                    </div>
                  ) : (<>
                    {/* Timer + text input row */}
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <div style={{position:'relative',width:48,height:48,flexShrink:0}}>
                        <svg width={48} height={48} style={{transform:'rotate(-90deg)'}}>
                          <circle cx={24} cy={24} r={20} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth={3}/>
                          <circle cx={24} cy={24} r={20} fill="none" stroke={timerColor} strokeWidth={3}
                            strokeDasharray={2*Math.PI*20} strokeDashoffset={2*Math.PI*20*(1-timerPct)} strokeLinecap="round"
                            style={{transition:'stroke-dashoffset .5s, stroke .5s',filter:`drop-shadow(0 0 4px ${timerColor})`}}/>
                        </svg>
                        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
                          fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:timerColor}}>
                          {timeLeft}
                        </div>
                      </div>
                      <input className="inp" placeholder="Type your answer and press Enter..."
                        value={fallbackInput} onChange={e=>setFallbackInput(e.target.value)}
                        onKeyDown={e=>e.key==='Enter'&&submitTextAnswer()}
                        style={{flex:1,fontSize:15,padding:'14px 16px'}} autoFocus/>
                      <button className="btn btn-gold" onClick={submitTextAnswer}
                        disabled={!fallbackInput.trim()} style={{padding:'14px 20px',fontSize:18}}>→</button>
                    </div>

                    {/* Mic button + STT transcript */}
                    <div style={{display:'flex',alignItems:'center',gap:10,marginTop:10}}>
                      <button className="btn btn-ghost" onClick={()=>doSTT()}
                        disabled={listening}
                        style={{fontSize:12,padding:'6px 12px',flexShrink:0}}>
                        {listening ? '🎤 Listening...' : '🎤 Use voice'}
                      </button>
                      {transcript && (
                        <div style={{flex:1,fontSize:12,color:'rgba(255,255,255,.4)',fontFamily:"'JetBrains Mono',monospace",
                          fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          <span style={{color:'#22d3ee'}}>{transcript}</span>
                          <span style={{color:'rgba(34,211,238,.25)'}}>{ghostText}</span>
                        </div>
                      )}
                      {listening && !transcript && (
                        <span style={{fontSize:12,color:'rgba(255,255,255,.3)',animation:'glow 1.5s infinite'}}>
                          Speak now...
                        </span>
                      )}
                    </div>
                  </>)}
                </>) : (
                  <div style={{fontWeight:700,fontSize:15}}>
                    🔔 <span style={{color:'#fbbf24'}}>{buzzer?.name}</span> buzzed in — answering now...
                  </div>
                )}
              </div>
            )}

            {phase==='question' && !buzzer && (
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,padding:14}}>
                <div style={{display:'flex',alignItems:'center',gap:16}}>
                  <div style={{position:'relative',width:64,height:64,flexShrink:0}}>
                    <svg width={64} height={64} style={{transform:'rotate(-90deg)'}}>
                      <circle cx={32} cy={32} r={28} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth={4}/>
                      <circle cx={32} cy={32} r={28} fill="none" stroke={timerColor} strokeWidth={4}
                        strokeDasharray={2*Math.PI*28} strokeDashoffset={2*Math.PI*28*(1-timerPct)} strokeLinecap="round"
                        style={{transition:'stroke-dashoffset .5s, stroke .5s',filter:`drop-shadow(0 0 4px ${timerColor})`}}/>
                    </svg>
                    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
                      fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:timerColor}}>
                      {timeLeft}
                    </div>
                  </div>
                  <button className="btn btn-gold" onClick={()=>buzzIn()}
                    style={{fontSize:18,padding:'14px 32px',animation:'glow 2.5s ease-in-out infinite'}}>
                    ⚡ BUZZ IN
                  </button>
                </div>
                <div style={{color:'rgba(255,255,255,.25)',fontSize:12,letterSpacing:1,marginTop:4}}>
                  or speak loudly to auto-buzz
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
</body>
</html>
